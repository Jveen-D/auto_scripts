name: AMUX Check-in

on:
  schedule:
    # GitHub Actions uses UTC. 22:00 UTC is 06:00 in Asia/Shanghai.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run AMUX check-in
        run: npm run checkin:amux
        env:
          AMUX_ACCESS_TOKEN: ${{ secrets.AMUX_ACCESS_TOKEN }}
          AMUX_COOKIE: ${{ secrets.AMUX_COOKIE }}
          AMUX_USER_ID: ${{ secrets.AMUX_USER_ID }}
